name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate personal stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate organization stats card
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORG="LyraVoid"
          PAGE=1
          TOTAL_STARS=0
          TOTAL_REPOS=0
          TOTAL_FORKS=0
          while true; do
            DATA=$(gh api "orgs/$ORG/repos?per_page=100&page=$PAGE&type=public" 2>/dev/null)
            COUNT=$(echo "$DATA" | jq length)
            if [ "$COUNT" = "0" ] || [ "$COUNT" = "null" ]; then break; fi
            STARS=$(echo "$DATA" | jq '[.[].stargazers_count] | add // 0')
            FORKS=$(echo "$DATA" | jq '[.[].forks_count] | add // 0')
            TOTAL_STARS=$((TOTAL_STARS + STARS))
            TOTAL_FORKS=$((TOTAL_FORKS + FORKS))
            TOTAL_REPOS=$((TOTAL_REPOS + COUNT))
            PAGE=$((PAGE + 1))
          done
          cat > profile/org-stats.svg << 'SVGHEADER'
          <svg width="467" height="130" viewBox="0 0 467 130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="descId">
            <title id="titleId">LyraVoid Organization Stats</title>
            <desc id="descId">Total Stars: {STARS}, Total Repos: {REPOS}, Total Forks: {FORKS}</desc>
            <style>
              .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #2f80ed; animation: fadeInAnimation 0.8s ease-in-out forwards; }
              .stat { font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #434d58; }
              .icon { fill: #4c71f2; display: block; }
              @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }
            </style>
            <rect data-testid="card-bg" x="0.5" y="0.5" rx="4.5" height="99%" stroke="#e4e2e2" width="466" fill="#fffefe" stroke-opacity="1"/>
            <g data-testid="card-title" transform="translate(25, 35)">
              <text x="0" y="0" class="header">LyraVoid Organization Stats</text>
            </g>
            <g data-testid="main-card-body" transform="translate(0, 55)">
              <svg x="0" y="0">
                <g transform="translate(25, 0)">
                  <svg class="icon" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
                  <text class="stat" x="25" y="12.5" font-weight="700">Total Stars:</text>
                  <text class="stat" x="219" y="12.5" font-weight="700">{STARS}</text>
                </g>
                <g transform="translate(25, 25)">
                  <svg class="icon" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/></svg>
                  <text class="stat" x="25" y="12.5" font-weight="700">Total Repos:</text>
                  <text class="stat" x="219" y="12.5" font-weight="700">{REPOS}</text>
                </g>
                <g transform="translate(25, 50)">
                  <svg class="icon" viewBox="0 0 16 16" width="16" height="16"><path fill-rule="evenodd" d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/></svg>
                  <text class="stat" x="25" y="12.5" font-weight="700">Total Forks:</text>
                  <text class="stat" x="219" y="12.5" font-weight="700">{FORKS}</text>
                </g>
              </svg>
            </g>
          </svg>
          SVGHEADER
          sed -i "s/{STARS}/$TOTAL_STARS/g; s/{REPOS}/$TOTAL_REPOS/g; s/{FORKS}/$TOTAL_FORKS/g" profile/org-stats.svg
          sed -i 's/^          //' profile/org-stats.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
